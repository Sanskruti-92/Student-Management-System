<!DOCTYPE html>
<html>
<head>
<title>Student Report Card</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Body */
body {
  background: #f0f4f8;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #1f2937;
}

/* Heading */
h1 {
  font-size: 36px;
  margin-bottom: 40px;
  color: #111827;
  text-align: center;
}

/* Container for form + report */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  width: 100%;
  max-width: 1200px;
}

/* Form Box */
.form-box {
  background: #ffffff;
  padding: 30px 25px;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  flex: 1 1 350px;
  min-width: 320px;
  transition: transform 0.3s;
}
.form-box:hover {
  transform: translateY(-3px);
}

/* Labels */
label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  color: #2563eb;
}

/* Inputs & Selects */
select, input {
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 12px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  font-size: 14px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #1e40af;
  transform: translateY(-2px);
}

/* Report Card */
.report-card {
  background: #ffffff;
  padding: 35px 30px;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  flex: 1 1 550px;
  min-width: 500px;
  display: none;
}

/* Header in Report */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}
.logo {
  width: 70px;
  margin-right: 15px;
}
.college-name {
  font-size: 24px;
  font-weight: 700;
  color: #1e3a8a;
}
.college-address {
  font-size: 14px;
  color: #555;
  text-align: center;
  margin-top: 3px;
}

/* Report Title */
.report-title {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 25px;
  color: #2563eb;
}

/* Student Info */
.student-info p {
  margin: 6px 0;
  font-size: 16px;
}

/* Marks Table */
.marks-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}
.marks-table th, .marks-table td {
  border: 1px solid #cbd5e1;
  padding: 10px;
  text-align: center;
}
.marks-table th {
  background: #e0f2fe;
  font-weight: 600;
  color: #1e40af;
}

/* Result Box */
.result-box {
  margin-top: 20px;
  font-size: 16px;
  font-weight: 500;
  line-height: 1.8;
  color: #111827;
}

/* Signature Section Fix */
.signature-section {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 columns for 4 signatures */
  gap: 20px;
  margin-top: 30px;
}

.signature-box {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.signature-name {
  font-family: 'Cursive', sans-serif;
  font-size: 16px;
  color: #1e3a8a;
  margin-bottom: 5px;
}

.signature-line {
  border-top: 2px solid #000;
  width: 100%;
  margin: 5px 0;
}

.signature-role {
  font-size: 14px;
  color: #555;
}

/* Responsive: collapse to 2 per row on smaller screens */
@media (max-width: 900px) {
  .signature-section {
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  }
}

@media (max-width: 600px) {
  .signature-section {
    grid-template-columns: 1fr; /* stack vertically on very small screens */
  }
}
</style>

</head>

<body>

<h1>Student Report Card</h1>

<div class="container">

<div class="form-box">

<label>Department</label>

<select id="department" onchange="loadStudents(); loadSubjects();">
<option value="">Select Department</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="MECH">MECH</option>
<option value="CIVIL">CIVIL</option>
<option value="EEE">EEE</option>
<option value="IT">IT</option>
</select>

<label>Student</label>

<select id="student"></select>

<div id="subjects"></div>

<button onclick="generateResult()">Generate Result</button>

</div>

<div id="report" class="report-card"></div>

</div>

<script>

let students={

CSE:[
"Sohail Nandyal","Kaneez Fatima","Mohammad Shafeeq A Pendari",
"Nagendra Chinnappa Bandivaddar","Aditi D Jadhav","Aditya Siddharoodh Malagoudar",
"Aishwarya F Mathad","Aishwarya Siddappa Kakhanda ki","Akash Gurappa Kalburgi"
],

ECE:[
"Akshata Kabade","Anees Shaikh","Ankita Devsingh Rajaput",
"Ankita Kabade","Apporva Mudhol","Arun Itagi",
"Bhaganna","Bharati Sangappa Inchageri","Bushra Nandiyal"
],

MECH:[
"Channabasu Sajjan","Gouri Chinnakalimath","Gururaj S Guggari",
"Hemanth Ramappa Hulyal","Jyotiba Jadhav","Kartik Rajashekhar Rathod",
"Laxmi Ingale","Mahalaxmi Somashekhar Kapali","Mallappa Bannur"
],

CIVIL:[
"Mallikarjun Shankar Sakri","Manoj Indi","Mohammad Asharaf Halli",
"Mohammed Rehan Godihal","Prasanna Somashekhar Bandigani",
"Reshma Zartargar","Rohit Basavaraj Vagga",
"Sahebagouda Hipparagi","Sanskruti Kadam"
],

EEE:[
"Shridhar Irayya Hiremath","Siddarth Basappa Bellennavar",
"Veena Suresh Heralagi","Prakash Dattarey Pujari",
"Venkatesh Mallikarjun Patil","Vijaykumar Basappa Kalburgi",
"Vinayak Mallikarjun Hanchinal","Vishal Shivanand Kittur"
],

IT:[
"Yallappa Hanamantappa Hanchinal","Yogesh Shankar Patil",
"Yuvraj Basavaraj Pujari","Zaheer Ahmed Jamadar",
"Zubair Ahmed Mulla","Zubair Shaikh",
"Zunaid Ahmed Attar","Zubair Mohammed Nandiyal"
]

};

let subjects={
CSE:["Programming","Data Structures","Database","Operating System","Web Development","Computer Networks"],
IT:["Programming","Database","Cloud Computing","Cyber Security","Web Development","Software Engineering"],
ECE:["Electronic Circuits","Digital Electronics","Signals","Communication","Microprocessors","VLSI"],
MECH:["Engineering Mechanics","Thermodynamics","Machine Design","Fluid Mechanics","Manufacturing","Heat Transfer"],
CIVIL:["Structural Engineering","Surveying","Geotechnical","Transportation","Environmental","Concrete Technology"],
EEE:["Electrical Machines","Power Systems","Control Systems","Power Electronics","Circuit Theory","Instrumentation"]
};

function loadStudents(){

let dept=document.getElementById("department").value;
let studentSelect=document.getElementById("student");

studentSelect.innerHTML="";

students[dept].forEach((name,i)=>{

let option=document.createElement("option");
option.value=i;
option.text=name;

studentSelect.appendChild(option);

});

}

function loadSubjects(){

let dept=document.getElementById("department").value;
let subjectBox=document.getElementById("subjects");

subjectBox.innerHTML="";

subjects[dept].forEach(sub=>{

let input=document.createElement("input");
input.type="number";
input.placeholder=sub;
input.className="marks";
input.max="100";

subjectBox.appendChild(input);

});

}

function generateResult(){

let dept=document.getElementById("department").value;
let index=document.getElementById("student").value;
let name=students[dept][index];

let marks=document.querySelectorAll(".marks");

let total=0;
let rows="";
let fail=false;

marks.forEach((input,i)=>{

let m=parseInt(input.value)||0;

if(m<35){fail=true;}

total+=m;

rows+=`
<tr>
<td>${subjects[dept][i]}</td>
<td>${m}</td>
</tr>
`;

});

let percent=(total/(marks.length*100))*100;

let grade="F";

if(percent>=90) grade="A+";
else if(percent>=80) grade="A";
else if(percent>=70) grade="B";
else if(percent>=60) grade="C";
else if(percent>=50) grade="D";

let result=fail?"FAIL":"PASS";

let report=document.getElementById("report");

report.style.display="block";

report.innerHTML=`

<div class="header">



<div>
<div class="college-name">Government Polytechnic, Vijayapur</div>
<div class="college-address">Vijayapur, Karnataka</div>
</div>

</div>

<div class="report-title">Semester Result Sheet</div>

<div class="student-info">
<p><b>Name:</b> ${name}</p>
<p><b>Department:</b> ${dept}</p>
</div>

<table class="marks-table">

<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

${rows}

</table>

<div class="result-box">

<b>Total :</b> ${total} <br>
<b>Percentage :</b> ${percent.toFixed(2)}% <br>
<b>Grade :</b> ${grade} <br>
<b>Result :</b> ${result}

</div>

<div class="signature-section">

<div class="signature-box">
<div class="signature-line"></div>
<div class="signature-role">Student</div>
</div>

<div class="signature-box">
<div class="signature-name">Prof. Ramesh</div>
<div class="signature-line"></div>
<div class="signature-role">Teacher</div>
</div>

<div class="signature-box">
<div class="signature-name">Dr. Patil</div>
<div class="signature-line"></div>
<div class="signature-role">HOD</div>
</div>

<div class="signature-box">
<div class="signature-name">Dr. S. Kulkarni</div>
<div class="signature-line"></div>
<div class="signature-role">Principal</div>
</div>

</div>

<button class="print-btn" onclick="window.print()">Print Report Card</button>

`;

}

</script>

</body>
</html>
